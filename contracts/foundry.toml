[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
allow_paths = ["../node_modules"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
# v4 hook callbacks have unavoidably deep frames (BalanceDelta + PoolKey calldata
# + locals). via_ir's IR pipeline handles them; the legacy pipeline hits
# "Stack too deep" without it. Compile time goes up ~2x in exchange.
via_ir = true

[rpc_endpoints]
sepolia = "${RPC_HTTP_URL}"

[fmt]
line_length = 100
tab_width = 4
